<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
    }
    * { scrollbar-width: none; scrollbar-color: #94a3b8 rgba(148, 163, 184, 0.15); }
    *:hover { scrollbar-width: thin; }
    *::-webkit-scrollbar { width: 0; height: 0; }
    *:hover::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: rgba(148, 163, 184, 0.15); border-radius: 9999px; }
    *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #cbd5e1, #94a3b8); border-radius: 9999px; border: 2px solid rgba(255, 255, 255, 0.6); }
    .dark *::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.6); }
    .dark *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #475569, #334155); border-color: rgba(15, 23, 42, 0.8); }
</style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3471b7",
                        "background-light": "#f6f7f8",
                        "background-dark": "#13191f",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Login | CRUD Admin</title>
    <script>
        if (localStorage.getItem('dark-mode') === 'true' || (!('dark-mode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<div class="fixed top-4 right-4">
<button id="dark-mode-toggle" class="p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span id="dark-mode-icon" class="material-symbols-outlined">light_mode</span>
</button>
</div>
<div class="w-full max-w-md">
<!-- Login Card -->
<div class="bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 shadow-2xl rounded-xl overflow-hidden backdrop-blur-sm">
<!-- Logo Section -->
<div class="pt-10 pb-6 flex flex-col items-center">
<div class="size-16 bg-primary/10 rounded-xl flex items-center justify-center mb-4">
<img class="size-10 object-contain" data-alt="CRUD Admin corporate logo geometric icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSvAwPBNolYbfKeeIW8FPkQ4Zh44B8zn9FHyiFNC20x_P4BcqtYodBLwdkKpljfV61M3JKO0W_Sn8n39rq6K3oN9eK8Vr2weBf4BzOeXU6pNEHwlQJ1nop7hILqlR86UNB7GSQzQ9ZTZEa20VHwq7QnkRBRSypZWlIAvsdzKhmoJG8W-3CIFzp5LQM78koHZXri9_afyDGUQwFzBbOgdMOie_8M0EcyEDCe1A5S0H4QsJZfFehBZOOsYyOEUPHjRRw8rM5jF-MBw"/>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Please sign in to your account</p>
</div>
<!-- Form Section -->
<form class="px-8 pb-10 space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none" placeholder="admin@crudadmin.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Checkbox -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-transparent" id="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer select-none" for="remember-me">
                        Stay logged in
                    </label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Info -->
<div class="bg-slate-50/50 dark:bg-slate-800/30 px-8 py-4 border-t border-slate-200 dark:border-slate-800 text-center">
<p class="text-xs text-slate-500 dark:text-slate-500 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-sm">shield</span>
                    Secure Administrator Access
                </p>
</div>
</div>
<!-- Decorative elements -->
<div class="mt-8 text-center space-y-4">
<div class="flex justify-center gap-6">
<a class="text-slate-400 hover:text-primary transition-colors text-xs font-medium uppercase tracking-widest" href="#">Help Center</a>
<a class="text-slate-400 hover:text-primary transition-colors text-xs font-medium uppercase tracking-widest" href="#">Privacy Policy</a>
</div>
<p class="text-slate-500 dark:text-slate-600 text-[10px] uppercase tracking-[0.2em] font-bold">© 2024 CRUD Admin System</p>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-20">
<div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
</div>
    <script>
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        const darkModeIcon = document.getElementById('dark-mode-icon');
        const htmlElement = document.documentElement;

        function updateIcon() {
            if (htmlElement.classList.contains('dark')) {
                darkModeIcon.textContent = 'dark_mode';
            } else {
                darkModeIcon.textContent = 'light_mode';
            }
        }

        updateIcon();

        darkModeToggle.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('dark-mode', isDark);
            updateIcon();
        });
    </script>
</body></html>
