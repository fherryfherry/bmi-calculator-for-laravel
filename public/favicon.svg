<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)"/>
  <!-- Scale/Weight Icon -->
  <g fill="white">
    <!-- Scale base -->
    <rect x="8" y="20" width="16" height="3" rx="1.5"/>
    <!-- Scale platform -->
    <rect x="10" y="17" width="12" height="3" rx="1"/>
    <!-- Display -->
    <rect x="13" y="12" width="6" height="4" rx="0.5" fill="white" opacity="0.9"/>
    <!-- Weight indicator -->
    <rect x="14.5" y="13" width="1" height="2" rx="0.5" fill="#0d9488"/>
  </g>
</svg>
